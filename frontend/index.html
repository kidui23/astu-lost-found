<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Digital Lost &amp; Found - Home</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Digital Lost &amp; Found</h1>
    </header>

    <main>
      <section class="card">
        <h2>Login</h2>
        <form id="login-form">
          <label>
            Email
            <input type="email" id="login-email" required />
          </label>
          <label>
            Password
            <input type="password" id="login-password" required />
          </label>
          <button type="submit">Login</button>
        </form>
        <p class="helper-text">
          New here?
          <a href="register.html">Create an account</a>
        </p>
      </section>
    </main>

    <script src="js/auth.js"></script>
  </body>
  </html>
