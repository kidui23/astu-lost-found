<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard - Digital Lost &amp; Found</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Your Items</h1>
      <nav>
        <a href="post-item.html">Post Item</a>
        <button id="logout-btn">Logout</button>
      </nav>
    </header>

    <main>
      <section class="card">
        <h2>Lost &amp; Found Items</h2>

        <!-- Search & Filter Bar -->
        <form id="filter-form" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
          <input type="text" id="search-input" placeholder="Search title/desc..." />
          <input type="text" id="filter-category" placeholder="Category" />
          <select id="filter-status">
            <option value="">Any Status</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
            <option value="claimed">Claimed</option>
          </select>
          <input type="text" id="filter-location" placeholder="Location" />
          <button type="submit">Search</button>
        </form>

        <ul id="items-list"></ul>
      </section>
    </main>

    <script src="js/items.js"></script>
  </body>
  </html>
