version: '3.8'

services:
  api:
    build: .
    container_name: lost_and_found_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    volumes:
      # Persist uploaded images across container restarts
      - ./uploads:/app/uploads

  mongodb:
    image: mongo:latest
    container_name: lost_and_found_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
